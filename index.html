  </div>

  <!-- Header fixo com auto-hide (controlado por js/header.js):
       marca à esquerda, botão hambúrguer circular à direita -->
  <header>
    <a class="marca-link" href="#home" aria-label="Voltar ao início">
      <svg viewBox="0 0 318 249" aria-hidden="true">
        <use href="#marca-jessica" />
      </svg>
    </a>
    <button class="botao-menu glass" type="button" aria-label="Abrir menu" aria-expanded="false"
      aria-controls="drawer-menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- Drawer lateral aberto pelo hambúrguer. Enquanto ele estiver
       aberto (body.drawer-aberto), o header não se esconde -->
  <nav id="drawer-menu" class="drawer-menu glass" aria-label="Menu principal">
    <!-- Os hrefs são âncoras reais (#coinple, #sobre...): com JS o
         clique é interceptado pelo router; sem JS continuam válidos -->
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#projetos">Projetos</a></li>
      <li><a href="#coinple">Coinple</a></li>
      <li><a href="#momentos">Momentos</a></li>
      <li><a href="#diagnostico">Diagnóstico de Liderança</a></li>
      <li><a href="#motorline">Motorline</a></li>
      <li><a href="#sobre">Quem sou eu</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
  </nav>

  <main>
    <div id="chat-jessy-ia">
    </div>
  </main>

  <!-- Home -->
  <template id="home">
    <section class="pagina-home">
      <!-- Composição de mockups: 3 celulares inclinados sobre
           blocos cinza decorativos (puramente visual) -->
      <div class="home-mockups" aria-hidden="true">
        <div class="bloco-decorativo bloco-decorativo--1"></div>
        <div class="bloco-decorativo bloco-decorativo--2"></div>
        <a href="#momentos"><img class="mockup mockup--centro" src="img/momentos-mockup-center.png" alt=""
            loading="eager" /></a>
        <a href="#coinple"><img class="mockup mockup--esquerda" src="img/coinple-mockup-left.png" alt=""
            loading="eager" /></a>
        <a href="#diagnostico"><img class="mockup mockup--direita" src="img/diagnostico-mockup-right.png" alt=""
            loading="eager" /></a>
      </div>
      <div class="home-conteudo">
        <!-- tabindex="-1": o router move o foco para o h1 ao navegar -->
        <h1 class="home-titulo" id="titulo-home" tabindex="-1">Simplificar o complicado!</h1>
        <p class="home-subtitulo">Design e Web para negócios em crescimento.</p>
        <!-- Slot onde o Chat Jessy é encaixado no estado expandido -->
        <div id="chat-slot"></div>
      </div>
    </section>
  </template>

  <!-- Páginas de conteúdo: clonadas pelo router (js/router.js) no
       momento da navegação. Cases de projeto usam <article>;
       os h1 têm tabindex="-1" para receber o foco ao trocar de página -->

  <template id="projetos">
    <section class="pagina-conteudo" aria-labelledby="titulo-projetos">
      <article>
        <h1 id="titulo-projetos" tabindex="-1">Projetos</h1>
      </article>
    </section>
  </template>

  <!-- Projeto Coinple -->
  <template id="coinple">
    <section class="pagina-conteudo" aria-labelledby="titulo-coinple">
      <article>
        <h1 id="titulo-coinple" tabindex="-1">Coinple</h1>
      </article>
    </section>
  </template>

  <!-- Projeto Momentos -->
  <template id="momentos">
    <section class="pagina-conteudo" aria-labelledby="titulo-momentos">
      <article>
        <h1 id="titulo-momentos" tabindex="-1">Momentos</h1>
      </article>
    </section>
  </template>

  <!-- Projeto Diagnóstico de Liderança -->
  <template id="diagnostico">
    <section class="pagina-conteudo" aria-labelledby="titulo-diagnostico">
      <article>
        <h1 id="titulo-diagnostico" tabindex="-1">Diagnóstico de Liderança</h1>
      </article>
    </section>
  </template>

  <!-- Projeto Motorline -->
  <template id="motorline">
    <section class="pagina-conteudo" aria-labelledby="titulo-motorline">
      <article>
        <h1 id="titulo-motorline" tabindex="-1">Motorline</h1>
      </article>
    </section>
  </template>

  <!-- Quem sou eu -->
  <template id="sobre">
    <section class="pagina-conteudo" aria-labelledby="titulo-sobre">
      <h1 id="titulo-sobre" tabindex="-1">Quem sou eu</h1>
    </section>
  </template>

  <!-- Contato -->
  <template id="contato">
    <section class="pagina-conteudo" aria-labelledby="titulo-contato">
      <h1 id="titulo-contato" tabindex="-1">Contato</h1>
    </section>
  </template>

  <!-- Filtro de distorção usado pela .glass -->
  <svg width="0" height="0" aria-hidden="true">
    <filter id="liquid-glass">
      <feTurbulence type="turbulence" baseFrequency="0.009" numOctaves="1" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" />
    </filter>
  </svg>

  <!-- JavaScritpts -->
  <!-- GSAP + plugin Flip via CDN (defer garante ordem antes do módulo) -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script src="js/preloader.js" defer></script>
  <script src="js/grid.js" defer></script>
  <!-- Ponto de entrada da aplicação (ES module): renderiza a home,
       inicia o header com auto-hide e o Chat Jessy -->
  <script type="module" src="js/main.js"></script>

</body>

</html>
